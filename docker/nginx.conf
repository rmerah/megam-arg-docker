server {
    listen 80;
    server_name _;

    # Frontend — fichiers statiques
    location / {
        root /app/frontend;
        index form_launch_analysis.html;
        try_files $uri $uri/ /form_launch_analysis.html;

        # Désactiver le cache navigateur pour les pages HTML
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Cache long pour les assets statiques (images, JS, CSS)
        location ~* \.(png|jpg|jpeg|gif|ico|svg|js|css|woff|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }
    }

    # API — reverse proxy vers uvicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts longs pour les analyses
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;

        # Support des uploads
        client_max_body_size 500M;
    }

    # Swagger / OpenAPI docs
    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://127.0.0.1:8000/redoc;
        proxy_set_header Host $host;
    }
}
